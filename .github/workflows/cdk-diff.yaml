name: CDK Diff Workflow

on:
  push:
    paths:
    - infra/**
  workflow_dispatch:

env:
  AWS_REGION: us-east-1

jobs:
  cdk_diff:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./infra

    permissions:
      contents: read
      id-token: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@900f2210b1d28bbbd0bd22d17926b9e224e8f231

    - name: Installing Node
      uses: actions/setup-node@670825a89dc0abd596e7a3abd0f5e3f6e5faf37c
      with:
        node-version: 25

    - name: Installing project dependencies
      run: npm install

    - name: Configuring AWS Crdentials for GitHub Actions Runner
      uses: aws-actions/configure-aws-credentials@681892c11b95f935aee43b00e43466327707adba
      with:
        aws-region: ${{ env.AWS_REGION }}
        role-to-assume: ${{ secrets.GHA_RUNNER_AWS_IAM_ROLE }}

    - name: Running cdk synth
      run: npx cdk synth --all -c imageTag=${{ github.sha }} --require-approval never

    - name: Running Checkov
      uses: bridgecrewio/checkov-action@4048c972aae68d0b983a48bb3479aab2d877b898
      with:
        directory: ./infra/cdk.out
        framework: cloudformation
        quiet: true
        soft_fail: true
        format: table
        
    - name: Running cdk diff
      run: npx cdk diff --all -c imageTag=${{ github.sha }} --require-approval never
      