name: Docker Workflow
on:
  push:
    paths:
      - "services/**"
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  IMAGE_TAG: ${{ github.sha }}

permissions:
  id-token: write
  contents: read

jobs:
  ecr_repositories_deployment:
    runs-on: ubuntu-latest
    steps:
  
    - name: Checkout repository
      uses: actions/checkout@900f2210b1d28bbbd0bd22d17926b9e224e8f231

    - name: Setting up Node
      uses: actions/setup-node@670825a89dc0abd596e7a3abd0f5e3f6e5faf37c
      with:
        node-version: 25

    - name: Installing project dependencies
      run: npm install

    - name: Configuring AWS Crdentials for GitHub Actions Runner
      uses: aws-actions/configure-aws-credentials@681892c11b95f935aee43b00e43466327707adba
      with:
        aws-region: ${{ env.AWS_REGION }}
        role-to-assume: ${{ secrets.GHA_RUNNER_AWS_IAM_ROLE }}

    - name: Running cdk diff
      run: cdk diff ecrStack --require-approval never
      working-directory: infra

    - name: Running cdk deploy
      run: cdk deploy ecrStack --require-approval never
  
  docker_images:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
        - service: api-image
          ecr_repo: API_ECR_REPOSITORY
        - service: worker-image
          ecr_repo: WORKER_ECR_REPOSITORY
        - service: dashboard-image
          ecr_repo: DASHBOARD_ECR_REPOSITORY

    steps:
    - name: Checkout repository
      uses: actions/checkout@900f2210b1d28bbbd0bd22d17926b9e224e8f231

    - name: Building docker images
      run: |
        docker build -t ${{ matrix.services }}:$IMAGE_TAG ./services/api
    
    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1
      with:
        image-ref: ${{ matrix.services }}:$IMAGE_TAG
        format: 'table'
        exit-code: '1'
        ignore-unfixed: true
        vuln-type: 'os,library'
        severity: 'CRITICAL,HIGH'
    
    - name: Configuring AWS Crdentials for GitHub Actions Runner
      uses: aws-actions/configure-aws-credentials@681892c11b95f935aee43b00e43466327707adba
      with:
        aws-region: ${{ env.AWS_REGION }}
        role-to-assume: ${{ secrets.GHA_RUNNER_AWS_IAM_ROLE }}

    - name: Login to Amazon ECR
      uses: aws-actions/amazon-ecr-login@fa648b43de3d4d023bcb3f89ed6940096949c419
      with:
        mask-password: true

    - name: Pushing up docker images to ECR repositories
      run: |
        docker tag ${{ matrix.services }}:$IMAGE_TAG ${{ secrets.[matrix.ecr_repo] }}:$IMAGE_TAG
        docker push ${{ secrets.[matrix.ecr_repo] }}